<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Fixora</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <div class="logo">
        <span style="font-family: 'Lucida Handwriting', cursive; font-size:48px;">F</span>
        <span style="font-size:36px;">ixora</span>
    </div>

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'register_user' %}" class="btn">Register</a>
    </nav>
</header>

<section class="auth-section">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to your Fixora account</p>

        <form method="POST">
           {% csrf_token %}
                 <input type="email" name="email" placeholder="Email Address" required>
                 <input type="password" name="password" placeholder="Password" required>
                 <button type="submit">Login</button>
        </form>
        <p class="switch-auth">
            Don't have an account?
            <a href="{% url 'register_user' %}">Register here</a>
        </p>
    </div>
{% if messages %}
  {% for message in messages %}
    <div class="alert">{{ message }}</div>
  {% endfor %}
{% endif %}
</section>

</body>
</html>
