<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Fixora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <span style="font-family: 'Lucida Handwriting', cursive; font-size:48px;">F</span>
        <span style="font-size:36px;">ixora</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="register_user.html" class="btn">Register</a>
    </nav>
</header>

<section class="auth-section">

    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to your Fixora account</p>

        <form>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p class="switch-auth">
            Don't have an account?
            <a href="register_user.html">Register here</a>
        </p>
    </div>

</section>

</body>
</html>
