<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Review - Fixora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <span style="font-family: 'Lucida Handwriting', cursive; font-size:48px;">F</span>
        <span style="font-size:36px;">ixora</span>
    </div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<section class="review-section">

    <div class="review-card">

        <h1>Leave a Review</h1>
        <p class="review-sub">Share your experience with this artisan.</p>

        <form>

           <div class="star-rating">
               <span>☆</span>
               <span>☆</span>
               <span>☆</span>
               <span>☆</span>
               <span>☆</span>
            </div>

            <textarea placeholder="Write your review here..." rows="5"></textarea>

            <button type="submit" class="fx-btn">Submit Review</button>

        </form>

    </div>

</section>

</body>
</html>
