<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Service - Fixora</title>

{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#1e3a8a;
color:white;
}

.request-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
}

.request-card{
background:white;
padding:40px;
width:420px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
}

.request-card h2{
color:#1e3a8a;
margin-bottom:10px;
}

.request-card p{
color:#555;
margin-bottom:25px;
}

.request-card input,
.request-card textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

.request-card textarea{
height:110px;
resize:none;
}

.request-btn{
width:100%;
padding:14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.request-btn:hover{
background:#16306f;
}

</style>

</head>

<body>

<header>
<div class="logo">
<span style="font-family:'Lucida Handwriting', cursive; font-size:48px;">F</span>
<span style="font-size:36px;">ixora</span>
</div>
</header>

<div class="request-wrapper">

<div class="request-card">

<h2>Service Requests</h2>

{% for r in requests %}

<div class="card">

    <p><b>Name:</b> {{ r.name }}</p>
    <p><b>Phone:</b> {{ r.phone }}</p>
    <p><b>Message:</b> {{ r.message }}</p>

    <p><b>Status:</b> {{ r.status }}</p>

    <p><b>Date:</b> {{ r.created_at }}</p>

    <a href="{% url 'accept_request' r.id %}"class="review-btn">Accept</a>

    <a href="{% url 'reject_request' r.id %}"class="review-btn">Reject</a>

</div>

<hr>

{% empty %}
<p>No requests yet</p>

{% endfor %}

</body>
</html>
